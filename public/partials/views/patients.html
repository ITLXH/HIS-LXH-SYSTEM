<div id="view-patients" style="display:none;">
  <div class="d-flex flex-wrap justify-content-between align-items-center mb-4 gap-2 pb-3" style="border-bottom:2px solid var(--border-color);">
    <div>
      <h3 class="fw-bold m-0 text-dark"><i class="fas fa-address-book text-primary me-2"></i><span data-i18n="patients.title">ລົງທະບຽນຄົນເຈັບ (Registration)</span></h3>
      <p class="text-muted mb-0 mt-1" style="font-size:11.5px;" data-i18n="patients.subtitle">ຂໍ້ມູນຄົນເຈັບທັງໝົດ — ຄົ້ນຫາ, ເພີ່ມ, ແກ້ໄຂ</p>
    </div>
    <div>
      <input type="file" id="patientExcelInput" accept=".xlsx, .xls, .csv" style="display: none;" onchange="window.handlePatientExcelUpload(event)">
      <button class="btn btn-outline-success shadow-sm fw-bold me-2" onclick="window.downloadExcelTemplate('patients')"><i class="fas fa-download me-1"></i> Template</button>
      <button class="btn btn-success shadow-sm fw-bold me-2" onclick="document.getElementById('patientExcelInput').click()"><i class="fas fa-file-excel me-1"></i> <span data-i18n="patients.uploadExcel">ອັບໂຫຼດ Excel</span></button>
      <button class="btn btn-outline-dark fw-bold shadow-sm me-2" onclick="window.openQRScanner()"><i class="fas fa-qrcode me-1"></i> <span data-i18n="patients.scanQr">ສະແກນບັດ QR</span></button>
      <button class="btn btn-primary shadow-sm fw-bold" onclick="window.openNewPatientModal()"><i class="fas fa-user-plus me-1"></i> <span data-i18n="patients.newPatient">ລົງທະບຽນຄົນເຈັບໃໝ່</span></button>
    </div>
  </div>
  <div id="patientLoadAllNotice" style="display:none;"></div>
  <div class="card card-outline card-primary">
    <div class="card-body table-responsive">
      <table id="patientTable" class="table table-hover w-100 align-middle">
        <thead class="bg-light">
          <tr>
            <th data-i18n="patients.date">ວັນທີ</th><th data-i18n="patients.time">ເວລາ</th><th>ID</th><th>Old ID</th><th data-i18n="patients.fullName">ຊື່ ແລະ ນາມສະກຸນ</th>
            <th data-i18n="patients.gender">ເພດ</th><th data-i18n="patients.age">ອາຍຸ</th><th data-i18n="patients.phone">ເບີໂທ</th><th data-i18n="patients.address">ທີ່ຢູ່</th>
            <th class="text-danger" data-i18n="patients.allergy">ອາການແພ້</th><th class="text-center" data-i18n="common.action">ຈັດການ</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>
</div>
