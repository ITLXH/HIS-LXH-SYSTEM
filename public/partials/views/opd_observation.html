<div id="view-opd_observation" class="ipd-workspace" style="display:none;">
  <div class="ipd-page-header d-flex flex-wrap justify-content-between align-items-center gap-2">
    <div class="d-flex align-items-center flex-wrap gap-2">
      <h3 class="fw-bold m-0 text-dark"><i class="fas fa-procedures text-primary me-2"></i><span data-i18n="obs.title">OPD Follow-up / Observation</span></h3>
      <div class="ipd-status-pills">
        <span class="ipd-pill"><i class="fas fa-bed"></i> <span data-i18n="ipd.totalBeds">Total Beds</span>: <strong id="obsTotalBeds">0</strong></span>
        <span class="ipd-pill is-occupied"><i class="fas fa-procedures"></i> <span data-i18n="ipd.occupied">Occupied</span>: <strong id="obsOccupiedBeds">0</strong></span>
        <span class="ipd-pill is-available"><i class="fas fa-check-circle"></i> <span data-i18n="ipd.available">Available</span>: <strong id="obsAvailableBeds">0</strong></span>
        <span class="ipd-pill is-reserved"><i class="fas fa-bookmark"></i> <span data-i18n="ipd.reserved">Reserved</span>: <strong id="obsReservedBeds">0</strong></span>
      </div>
    </div>
    <div class="d-flex align-items-center gap-2">
      <button class="btn btn-warning text-dark fw-bold shadow-sm px-3 btn-obs-add" onclick="window.openObservationFromBoard()">
        <i class="fas fa-notes-medical me-1"></i><span data-i18n="obs.startObservation">Observation</span>
      </button>
      <button class="btn btn-info text-white fw-bold shadow-sm px-3" onclick="window.loadObservationPage()">
        <i class="fas fa-sync-alt me-1"></i><span data-i18n="ipd.refresh">Refresh</span>
      </button>
    </div>
  </div>

  <div id="obsBedBoard"></div>

  <div class="obs-detail-panel mt-3" id="observationDetailPanel" style="display:none;">
    <div class="obs-detail-head">
      <div>
        <h5 id="obsDetailTitle" class="fw-bold mb-1"></h5>
        <div id="obsDetailMeta" class="text-muted small"></div>
      </div>
      <div class="d-flex flex-wrap gap-2 obs-detail-toolbar">
        <button class="btn btn-sm btn-outline-danger" onclick="window.closeObservationDetail()" title="Close"><i class="fas fa-times"></i></button>
        <button class="btn btn-sm btn-danger btn-obs-note" onclick="window.openObservationNoteModal('VITAL_SIGN')"><i class="fas fa-heartbeat me-1"></i><span data-i18n="obs.addVital">Vital Sign</span></button>
        <div class="dropdown">
          <button class="btn btn-sm btn-primary dropdown-toggle btn-obs-note" type="button" data-bs-toggle="dropdown" aria-expanded="false"><i class="fas fa-pen me-1"></i><span data-i18n="obs.documentNote">Document</span></button>
          <ul class="dropdown-menu">
            <li><a class="dropdown-item btn-obs-note" href="#" onclick="window.openObservationNoteModal('DOCTOR_NOTE'); return false;"><i class="fas fa-user-md text-primary me-2"></i><span data-i18n="obs.doctorNote">Doctor Note</span></a></li>
            <li><a class="dropdown-item btn-obs-note" href="#" onclick="window.openObservationNoteModal('NURSING_NOTE'); return false;"><i class="fas fa-user-nurse text-success me-2"></i><span data-i18n="obs.nursingNote">Nursing Note</span></a></li>
            <li><a class="dropdown-item btn-obs-note" href="#" onclick="window.openObservationNoteModal('PROCEDURE'); return false;"><i class="fas fa-procedures text-warning me-2"></i><span data-i18n="obs.procedure">Procedure</span></a></li>
          </ul>
        </div>
        <div class="dropdown">
          <button class="btn btn-sm btn-dark dropdown-toggle btn-obs-view" type="button" data-bs-toggle="dropdown" aria-expanded="false"><i class="fas fa-bed me-1"></i><span data-i18n="obs.bedManagement">Bed Management</span></button>
          <ul class="dropdown-menu">
            <li><a class="dropdown-item btn-obs-view" href="#" onclick="window.openObservationTransferModal(window.currentObservationId); return false;"><i class="fas fa-exchange-alt text-primary me-2"></i><span data-i18n="ipd.transferBed">Transfer Bed</span></a></li>
            <li><a class="dropdown-item btn-obs-convert" href="#" onclick="window.convertObservationToIpd(window.currentObservationId); return false;"><i class="fas fa-bed text-warning me-2"></i><span data-i18n="obs.convertToIpd">Convert to IPD</span></a></li>
            <li><a class="dropdown-item btn-obs-discharge" href="#" onclick="window.dischargeObservation(window.currentObservationId); return false;"><i class="fas fa-sign-out-alt text-secondary me-2"></i><span data-i18n="ipd.dischargeReleaseBed">Discharge / Release Bed</span></a></li>
          </ul>
        </div>
      </div>
    </div>
    <div id="obsSixHourAlert" class="alert alert-warning py-2 px-3 my-3" style="display:none;"></div>
    <div id="observationTimeline" class="obs-timeline"></div>
  </div>
</div>
