name: Supabase DB Backup

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Manual backup reason'
        required: false
        default: 'manual'

env:
  RETENTION_DAYS: 30

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PostgreSQL Client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client zip
          pg_dump --version

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python deps
        run: pip install google-api-python-client google-auth-httplib2 requests

      - name: Set Supabase connection host
        id: supabase_host
        run: |
          SUPABASE_URL="${{ secrets.SUPABASE_URL }}"
          REF=$(echo "$SUPABASE_URL" | sed 's|https://||' | sed 's|\.supabase\.co||')
          echo "ref=${REF}" >> $GITHUB_OUTPUT
          echo "host=db.${REF}.supabase.co" >> $GITHUB_OUTPUT

      - name: Export CSVs and SQL dump
        run: |
          mkdir -p output/sql output/csv

          SUPABASE_URL="${{ secrets.SUPABASE_URL }}"
          REF=$(echo "$SUPABASE_URL" | sed 's|https://||' | sed 's|\.supabase\.co||')
          DB_HOST="db.${REF}.supabase.co"

          echo "Attempting pg_dump via pooler (port 6543)..."

          # Try pooler port 6543 first (more accessible from GitHub Actions)
          PGPASSWORD="${{ secrets.SUPABASE_PASSWORD }}" \
          pg_dump -h "${DB_HOST}" -p 6543 \
                  -U postgres \
                  -d postgres \
                  --clean --if-exists \
                  --no-owner --no-acl \
                  -f output/sql/full-backup-$(date +%F).sql 2>&1 || true

          # If the pooler dump is empty, try direct connection
          SQL_FILE="output/sql/full-backup-$(date +%F).sql"
          if [ ! -s "$SQL_FILE" ]; then
            echo "Pooler dump empty, trying direct connection (port 5432)..."
            PGPASSWORD="${{ secrets.SUPABASE_PASSWORD }}" \
            pg_dump -h "${DB_HOST}" -p 5432 \
                    -U postgres \
                    -d postgres \
                    --clean --if-exists \
                    --no-owner --no-acl \
                    -f "$SQL_FILE" 2>&1 || true
          fi

          if [ -s "$SQL_FILE" ]; then
            echo "SQL dump created: $(du -h $SQL_FILE | cut -f1)"
          else
            echo "No SQL dump (DB connection blocked - will use CSV exports only)"
          fi

          # Export CSVs using psql via pooler
          echo "Attempting table exports..."
          TABLES=$(PGPASSWORD="${{ secrets.SUPABASE_PASSWORD }}" psql -qta -h "${DB_HOST}" -p 6543 \
            -U postgres -d postgres \
            -c "SELECT string_agg(quote_ident(tablename), ',')
                FROM pg_tables
                WHERE schemaname = 'public' AND tablename NOT LIKE 'pg_%' AND tablename NOT LIKE 'sql_%'" 2>/dev/null) || \
          TABLES=$(PGPASSWORD="${{ secrets.SUPABASE_PASSWORD }}" psql -qta -h "${DB_HOST}" -p 5432 \
            -U postgres -d postgres \
            -c "SELECT string_agg(quote_ident(tablename), ',')
                FROM pg_tables
                WHERE schemaname = 'public' AND tablename NOT LIKE 'pg_%' AND tablename NOT LIKE 'sql_%'" 2>/dev/null) || true

          if [ -z "$TABLES" ]; then
            echo "WARNING: Could not connect to database for table discovery"
          else
            echo "Tables to export: $TABLES"
            IFS=',' read -ra TS <<< "$TABLES"
            for t in "${TS[@]}"; do
              echo "  -> $t"
              PGPASSWORD="${{ secrets.SUPABASE_PASSWORD }}" \
              psql -qt -h "${DB_HOST}" -p 6543 -U postgres -d postgres \
              -c "\copy (select * from public.${t}) to 'output/csv/${t}.csv' csv header" 2>/dev/null || \
              PGPASSWORD="${{ secrets.SUPABASE_PASSWORD }}" \
              psql -qt -h "${DB_HOST}" -p 5432 -U postgres -d postgres \
              -c "\copy (select * from public.${t}) to 'output/csv/${t}.csv' csv header" 2>/dev/null || \
              echo "  -> WARNING: failed to export $t"
            done
          fi

          # Verify we have at least CSV files
          CSV_COUNT=$(ls output/csv/*.csv 2>/dev/null | wc -l)
          SQL_SIZE=$(stat -c%s "$SQL_FILE" 2>/dev/null || echo 0)
          echo "CSV files exported: $CSV_COUNT"
          echo "SQL dump size: $SQL_SIZE bytes"


      - name: Build changelog
        run: |
          echo "HIS Database Backup - $(date -u '+%Y-%m-%d %H:%M UTC')" > output/CHANGELOG.txt
          echo "Trigger: ${{ github.event_name }}" >> output/CHANGELOG.txt
          echo "Run: ${{ github.run_id }}" >> output/CHANGELOG.txt
          if [[ -n "${{ github.event.inputs.reason }}" ]]; then
            echo "Reason: ${{ github.event.inputs.reason }}" >> output/CHANGELOG.txt
          fi
          cat output/CHANGELOG.txt

      - name: Zip backup
        run: |
          D=$(date +%F)
          zip -r "backup-${D}.zip" output/
          echo "ZIP_NAME=backup-${D}.zip" >> $GITHUB_ENV
          echo "ZIP_SIZE=$(du -h backup-${D}.zip | cut -f1)" >> $GITHUB_ENV

      - name: Upload to Google Drive
        id: gdrive
        continue-on-error: true
        run: |
          python backup/scripts/gdrive_upload.py "${{ env.ZIP_NAME }}" "${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}"
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_DRIVE_CREDENTIALS_JSON }}

      - name: Upload to Supabase Storage
        id: supabase_upload
        continue-on-error: true
        run: |
          BUCKET="${{ secrets.SUPABASE_STORAGE_BUCKET }}"
          YEAR=$(date +%Y)
          MONTH=$(date +%m)
          OBJECT_PATH="backups/${YEAR}/${MONTH}/${ZIP_NAME}"
          SUPABASE_API="${{ secrets.SUPABASE_URL }}"

          echo "Uploading to Supabase Storage bucket: ${BUCKET}"
          echo "Object path: ${OBJECT_PATH}"

          HTTP_CODE=$(curl -s -o /tmp/sb_response.txt -w '%{http_code}' \
            -X POST "${SUPABASE_API}/storage/v1/object/${BUCKET}/${OBJECT_PATH}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/zip" \
            --data-binary "@${ZIP_NAME}")

          echo "HTTP_CODE=${HTTP_CODE}" >> $GITHUB_OUTPUT
          RESPONSE=$(cat /tmp/sb_response.txt)

          if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "201" ]; then
            echo "  Upload SUCCESS (${BUCKET}/${OBJECT_PATH})"
            echo "SUPABASE_URL=${SUPABASE_API}/storage/v1/object/public/${BUCKET}/${OBJECT_PATH}" >> $GITHUB_OUTPUT
          else
            echo "  Upload FAILED (HTTP ${HTTP_CODE})"
            echo "  Response: ${RESPONSE}"
            exit 1
          fi

      - name: Cleanup Google Drive
        continue-on-error: true
        run: python backup/scripts/gdrive_cleanup.py "${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}"
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_DRIVE_CREDENTIALS_JSON }}
          RETENTION_DAYS: ${{ env.RETENTION_DAYS }}

      - name: Cleanup Supabase Storage
        continue-on-error: true
        run: python backup/scripts/supabase_cleanup.py
        env:
          SUPABASE_HOST: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_STORAGE_BUCKET: ${{ secrets.SUPABASE_STORAGE_BUCKET }}
          RETENTION_DAYS: ${{ env.RETENTION_DAYS }}

      - name: Backup summary
        if: always()
        run: |
          GD_STATUS="skipped"
          GD_URL="-"
          SB_STATUS="skipped"
          SB_URL="-"

          if [ "${{ steps.gdrive.outcome }}" = "success" ]; then
            GD_STATUS="SUCCESS"
            GD_URL="${{ steps.gdrive.outputs.drive_url }}"
          elif [ "${{ steps.gdrive.outcome }}" = "failure" ]; then
            GD_STATUS="FAILED"
          fi

          if [ "${{ steps.supabase_upload.outcome }}" = "success" ]; then
            SB_STATUS="SUCCESS"
            SB_URL="${{ steps.supabase_upload.outputs.supabase_url }}"
          elif [ "${{ steps.supabase_upload.outcome }}" = "failure" ]; then
            SB_STATUS="FAILED"
          fi

          echo "## HIS Database Backup Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "| Detail | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Date | $(date -u '+%Y-%m-%d %H:%M UTC') |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Trigger | ${{ github.event_name }} ${{ github.event.inputs.reason || '' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| ZIP Size | ${{ env.ZIP_SIZE || '-' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Google Drive | ${GD_STATUS} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Drive URL | [link](${GD_URL}) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Supabase Storage | ${SB_STATUS} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Supabase URL | [link](${SB_URL}) |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "*No backup files committed to this repository.*" >> "$GITHUB_STEP_SUMMARY"

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Backup failed! Check the workflow logs for details."
